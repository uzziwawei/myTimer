<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body{
      margin:0;
      padding:20px;
      font-family:Arial,sans-serif;
      background:#f5f5f5;
      display:flex;
      justify-content:center;
    }
    .container{
      width:100%;
      max-width:420px;
      text-align:center;
      background:white;
      border-radius:25px;
      padding:25px;
      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }
    .button-row, .adjust-row {
      display:flex;
      gap:10px;
      margin-bottom:30px;
    }
    .adjust-row {
      margin-top: 5px;
      margin-bottom: 25px;
      gap: 12px;
    }
    button {
      padding:14px;
      border:none;
      border-radius:12px;
      font-size:16px;
      font-weight:bold;
      cursor:pointer;
    }
    .button-row button, .adjust-row button {
      flex:1;
    }
    /* Tombol Pengatur Waktu Custom 30 Detik */
    .btn-adjust {
      background: #e8eaed;
      color: #3c4043;
      padding: 10px;
      font-size: 15px;
      border: 1px solid #dadce0;
    }
    .btn-adjust:active {
      background: #d2d4d7;
    }
    .start{
      background:#34A853;
      color:white;
    }
    .pause{
      background:#FBBC04;
      color:black;
    }
    .reset{
      background:#EA4335;
      color:white;
    }
    .back-button{
      margin-top:30px;
      width:100%;
      background:#4285F4;
      color:white;
    }
    .label{
      font-size:18px;
      color:#777;
      margin-top:15px;
    }
    .timer{
      font-size:120px;
      font-weight:bold;
      margin-top:5px;
    }
    .interval{
      font-size:28px;
      font-weight:bold;
      margin-top:5px;
      color:#202124;
    }
    .status{
      margin-top:10px;
      min-height:90px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:20px;
      font-size:32px;
      font-weight:bold;
      transition:0.2s;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="container">

  <h2 style="margin-top: 0; margin-bottom: 5px; color: #333; font-size: 38px; font-weight: bold; letter-spacing: 1px;">CFIT 3A</h2>
  
  <div id="subtes-name" style="font-size: 18px; color: #5f6368; font-weight: bold; margin-bottom: 25px;">
    Subtes 1: Series
  </div>

  <div class="label" style="margin-top: 10px;">
    SISA WAKTU
  </div>

  <div id="timer" class="timer" style="font-size: 130px; margin-top: 5px; margin-bottom: 5px; line-height: 0.9;">
    03:00
  </div>

  <div class="adjust-row">
    <button class="btn-adjust" onclick="adjustTime(-30)">- 30 DETIK</button>
    <button class="btn-adjust" onclick="adjustTime(30)">+ 30 DETIK</button>
  </div>

  <div class="label" style="margin-top: 10px;">
    PROGRESS
  </div>

  <div id="interval" class="interval" style="margin-top: 0px; margin-bottom: 25px;">
    Subtes 1 / 4
  </div>

  <div id="status" class="status"></div>

  <div class="button-row" style="margin-top: 10px; margin-bottom: 15px;">
    <button class="start" onclick="startTimer()">
      MULAI
    </button>
    <button class="pause" onclick="pauseTimer()">
      PAUSE
    </button>
    <button class="reset" onclick="resetTimer()">
      RESET
    </button>
  </div>

  <button class="back-button" style="margin-top: 0px;" onclick="window.location.href='index.html'">
    ← KEMBALI
  </button>

</div>

<script>

const cfitConfig = [
  { name: "Subtes 1: Series", time: 180 },          
  { name: "Subtes 2: Classification", time: 240 },  
  { name: "Subtes 3: Matrices", time: 180 },        
  { name: "Subtes 4: Topology", time: 150 } // Standar 2 Menit 30 Detik
];

let currentSubtesIndex = 0; 
let currentSecond = cfitConfig[currentSubtesIndex].time;

let running = false;
let paused = false;
let loop;

function formatTime(seconds) {
  let m = Math.floor(seconds / 60).toString().padStart(2, '0');
  let s = (seconds % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function updateDisplay(){
  document.getElementById("timer").innerText = formatTime(currentSecond);
  document.getElementById("subtes-name").innerText = cfitConfig[currentSubtesIndex].name;
  document.getElementById("interval").innerText = `Subtes ${currentSubtesIndex + 1} / 4`;
}

function adjustTime(amount) {
  // Tombol tidak merespon jika timer sudah berjalan berjalan
  if (running) return; 
  
  // Pastikan waktu tidak dikurangi sampai minus (minimal 0 detik)
  if (currentSecond + amount >= 0) {
    currentSecond += amount;
    updateDisplay();
  }
}

function showStatus(text,bg,color){
  const s = document.getElementById("status");
  s.innerText = text;
  s.style.background = bg;
  s.style.color = color;
}

function clearStatus(){
  const s = document.getElementById("status");
  s.innerText = "";
  s.style.background = "white";
}

function startTimer(){
  if(running) return;

  running = true;
  paused = false;

  showStatus("MULAI", "#34A853", "white");

  setTimeout(() => {
    clearStatus();
    startLoop();
  }, 1000);
}

function startLoop(){
  updateDisplay();

  loop = setInterval(() => {
    if(paused) return;

    currentSecond--;
    updateDisplay();

    if(currentSecond <= 0){
      clearInterval(loop);
      running = false;

      showStatus("BERHENTI", "#EA4335", "white");

      setTimeout(() => {
        clearStatus();

        if (currentSubtesIndex < 3) {
          currentSubtesIndex++;
          currentSecond = cfitConfig[currentSubtesIndex].time; // Otomatis balik ke default subtes baru
          updateDisplay(); 
        } else {
          showStatus("SELESAI", "#4285F4", "white");
        }
      }, 1000);
    }
  }, 1000);
}

function pauseTimer(){
  if(!running) return;

  paused = !paused;

  if(paused){
    showStatus("PAUSE", "#9AA0A6", "white");
  }else{
    clearStatus();
  }
}

function resetTimer(){
  clearInterval(loop);
  running = false;
  paused = false;

  currentSubtesIndex = 0;
  currentSecond = cfitConfig[currentSubtesIndex].time;

  updateDisplay();
  clearStatus();
}

updateDisplay();

</script>

</body>
</html>

.grid{

  padding:25px 10px;

  font-weight:bold;

  cursor:pointer;
}

</style>

</head>

<body>

<div class="subtitle">

  <div class="card"

  </div>

       onclick="window.location.href='epps.html'">
    EPPS
  </div>

  <div class="card"

  </div>

  <div class="card"
       onclick="window.location.href='baum.html'">

</html>

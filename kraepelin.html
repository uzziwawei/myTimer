<!DOCTYPE html>
<html>
<head>

  <base target="_top">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <style>

    body{
      margin:0;
      padding:20px;
      font-family:Arial,sans-serif;
      background:#f5f5f5;

      display:flex;
      justify-content:center;
    }

    .container{

      width:100%;
      max-width:420px;

      text-align:center;
      background:white;

      border-radius:25px;

      padding:25px;

      box-shadow:0 4px 15px rgba(0,0,0,0.1);
    }

    .button-row{

      display:flex;
      gap:10px;

      margin-bottom:30px;
    }

button{

      padding:14px;

      border:none;

      border-radius:12px;

      font-size:16px;

      font-weight:bold;

      cursor:pointer;
    }

.button-row button{
      flex:1;
}

    .start{
      background:#34A853;
      color:white;
    }

    .pause{
      background:#FBBC04;
      color:black;
    }

    .reset{
      background:#EA4335;
      color:white;
    }

    .back-button{

      margin-top:30px;

      width:100%;

      background:#4285F4;

      color:white;
    }

    .label{

      font-size:18px;
      color:#777;

      margin-top:15px;
    }

    .timer{

      font-size:100px;
      font-weight:bold;

      margin-top:5px;
    }

    .interval{

      font-size:42px;
      font-weight:bold;

      margin-top:5px;
    }

    .status{

      margin-top:30px;

      min-height:110px;

      display:flex;
      align-items:center;
      justify-content:center;

      border-radius:20px;

      font-size:58px;
      font-weight:bold;

      transition:0.2s;
    }

  </style>

</head>

<body>

<div class="container">

<h2 style="margin-top: 0; margin-bottom: 25px; color: #333; font-size: 26px; font-weight: bold; letter-spacing: 1px;">KRAEPELIN</h2>
  
  <div class="button-row">

    <button class="start" onclick="startTimer()">
      MULAI
    </button>

    <button class="pause" onclick="pauseTimer()">
      PAUSE
    </button>

    <button class="reset" onclick="resetTimer()">
      RESET
    </button>

  </div>

  <div class="label">
    SISA WAKTU
  </div>

  <div id="timer" class="timer">
    15
  </div>

  <div class="label">
    INTERVAL
  </div>

  <div id="interval" class="interval">
    1 / 50
  </div>

  <div id="status" class="status"></div>

  <button class="back-button"
  onclick="window.location.href='index.html'">
    ← KEMBALI
  </button>

</div>

<script>

let currentInterval = 1;
let currentSecond = 15;

let running = false;
let paused = false;

let loop;

function updateDisplay(){

  document.getElementById("timer").innerText = currentSecond;

  document.getElementById("interval").innerText =
    currentInterval + " / 50";
}

function showStatus(text,bg,color){

  const s = document.getElementById("status");

  s.innerText = text;

  s.style.background = bg;
  s.style.color = color;
}

function clearStatus(){

  const s = document.getElementById("status");

  s.innerText = "";

  s.style.background = "white";
}

function startTimer(){

  if(running) return;

  running = true;
  paused = false;

  showStatus(
    "MULAI",
    "#34A853",
    "white"
  );

  setTimeout(() => {

    clearStatus();

    startLoop();

  },1000);
}

function startLoop(){

  updateDisplay();

  loop = setInterval(() => {

    if(paused) return;

    currentSecond--;

    updateDisplay();

    if(currentSecond <= 0){

      clearInterval(loop);

      if(currentInterval < 50){

        showStatus(
          "PINDAH",
          "#FBBC04",
          "black"
        );

        setTimeout(() => {

          clearStatus();

          currentInterval++;

          currentSecond = 15;

          startLoop();

        },1000);

      }else{

        showStatus(
          "BERHENTI",
          "#EA4335",
          "white"
        );

        running = false;
      }
    }

  },1000);
}

function pauseTimer(){

  if(!running) return;

  paused = !paused;

  if(paused){

    showStatus(
      "PAUSE",
      "#9AA0A6",
      "white"
    );

  }else{

    clearStatus();
  }
}

function resetTimer(){

  clearInterval(loop);

  running = false;
  paused = false;

  currentInterval = 1;
  currentSecond = 15;

  updateDisplay();

  clearStatus();
}

updateDisplay();

</script>

</body>
</html>
